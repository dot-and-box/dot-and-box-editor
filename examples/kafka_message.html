<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Kafka Message</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <style>
    body {
      margin: 10px auto;
      overflow-x: hidden;
    }

    .content {
      margin-left: auto;
      margin-right: auto;
      width: 95%;
    }

    .links {
      position: relative;
      padding-top: 20px;
      padding-left: 5px;
      display: flex;
      margin-bottom: 5px;
    }

    .links a {
      margin-right: 10px;
    }

  </style>
  <link href="prism.css" rel="stylesheet" />
  <script crossorigin src="https://dot-and-box.github.io/dot-and-box/dot-and-box.js"></script>
</head>
<body>
<div class="content">

  <dot-and-box
          controls keyboard
          style="height: 1100px"
          code="
          title: 'Kafka Message Structure'
          box id: message text: 'Kafka Message Structure' at: [-2.2,-4.2] size: [7.4,11.4] color: white textColor: black borderColor: black align: left verticalAlign: top
          boxes ids: 'key' 'payload' 'headers - kay value pairs' 'timestamp (CreateTime, LogAppendTime)' 'CRC' 'Offset' at: [-2,-3] size: [7,1.5] span: 0.2 layout: row
"


  >
  </dot-and-box>

</div>



</body>
</html>
